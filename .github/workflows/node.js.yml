name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  backend-test:
    name: Backend – Install & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install dependencies (if package.json exists)
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No package.json yet — skipping backend install"
          fi

      - name: Run tests (if package.json exists)
        run: |
          if [ -f package.json ]; then
            npm test
          else
            echo "No package.json yet — skipping backend tests"
          fi
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          PORT: 5000
          JWT_SECRET: ci_test_jwt_secret_key

  frontend-build:
    name: Frontend – Install & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000
